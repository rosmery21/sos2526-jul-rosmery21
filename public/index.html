<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOS2526-10</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050d1a;
      --card: #0b1a2e;
      --accent: #00d4ff;
      --accent2: #0066ff;
      --text: #cce8f4;
      --muted: #5a7a90;
      --border: rgba(0, 212, 255, 0.2);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Syne', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Animated background ── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: drift linear infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #0066ff, transparent 70%); top: -150px; left: -100px; animation-duration: 20s; }
    .orb-2 { width: 350px; height: 350px; background: radial-gradient(circle, #00d4ff, transparent 70%); bottom: -100px; right: -80px; animation-duration: 16s; animation-delay: -8s; }
    .orb-3 { width: 250px; height: 250px; background: radial-gradient(circle, #0033cc, transparent 70%); top: 50%; left: 50%; animation-duration: 25s; animation-delay: -5s; }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(40px, -60px) scale(1.1); }
      66%  { transform: translate(-30px, 30px) scale(0.9); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridScroll 30s linear infinite;
    }

    @keyframes gridScroll {
      from { background-position: 0 0; }
      to   { background-position: 60px 60px; }
    }

    .scanline {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--accent);
      border-radius: 50%;
      animation: floatUp linear infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      max-width: 780px;
      width: 100%;
      background: linear-gradient(135deg, rgba(11,26,46,0.96), rgba(5,13,26,0.98));
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3rem 3.5rem;
      box-shadow:
        0 0 0 1px rgba(0,212,255,0.05),
        0 0 60px rgba(0,102,255,0.15),
        0 40px 80px rgba(0,0,0,0.6);
      animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--accent);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .card-glow {
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    /* ── Typography ── */
    h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
      margin-bottom: 0.5rem;
      animation: textGlow 3s ease-in-out infinite;
    }
    @keyframes textGlow {
      0%, 100% { text-shadow: 0 0 20px rgba(0,212,255,0.4); }
      50%       { text-shadow: 0 0 35px rgba(0,212,255,0.8), 0 0 60px rgba(0,102,255,0.3); }
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .subtitle a {
      color: var(--accent);
      text-decoration: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.82em;
      opacity: 0.85;
      transition: opacity 0.2s, text-shadow 0.2s;
    }
    .subtitle a:hover {
      opacity: 1;
      text-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
    }

    ul { list-style: none; }

    /* ── Sections ── */
    .section {
      margin-bottom: 2rem;
      animation: fadeSlide 0.6s ease forwards;
      opacity: 0;
    }
    .section:nth-child(1) { animation-delay: 0.3s; }
    .section:nth-child(2) { animation-delay: 0.5s; }
    .section:nth-child(3) { animation-delay: 0.7s; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      display: block;
      margin-bottom: 0.75rem;
    }

    /* ── API list ── */
    .api-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .api-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 1rem;
      border-left: 2px solid var(--accent2);
      background: rgba(0, 102, 255, 0.05);
      transition: background 0.2s, border-color 0.2s;
    }
    .api-item:hover {
      background: rgba(0, 212, 255, 0.08);
      border-color: var(--accent);
    }

    .api-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .api-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    .api-author {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .api-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
      opacity: 0.85;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
    }
    .api-link::before { content: '→'; }
    .api-link:hover {
      opacity: 1;
      background: rgba(0,212,255,0.08);
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(0,212,255,0.15);
      text-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
    }

    /* ── About link ── */
    .about-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.85;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
    }
    .about-link::before { content: '→'; }
    .about-link:hover {
      opacity: 1;
      background: rgba(0,212,255,0.08);
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(0,212,255,0.15);
      text-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
    }
  </style>
</head>
<body>

  <div class="bg-canvas">
    <div class="grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="scanline"></div>
  </div>

  <div class="card">
    <div class="card-glow"></div>

    <h1>SOS2526-10</h1>
    <p class="subtitle">Welcome to the SOS2526-10 project.</p>

    <div class="section">
      <span class="section-label">Available APIs</span>
      <ul class="api-list">
        <li class="api-item">
          <div class="api-info">
            <span class="api-name">Protests API</span>
            <span class="api-author">developed by Onésimo Morillo Vecino</span>
          </div>
          <a class="api-link" href="/api/v1/protests">API</a>
        </li>
        <li class="api-item">
          <div class="api-info">
            <span class="api-name">Deaths by Risk Factors API</span>
            <span class="api-author">developed by Santiago Muñoz Jiménez</span>
          </div>
          <a class="api-link" href="/api/v1/deaths-by-risk-factors">API</a>
        </li>
        <li class="api-item">
          <div class="api-info">
            <span class="api-name">Pandemics API</span>
            <span class="api-author">developed by Alexia Gutiérrez Casado</span>
          </div>
          <a class="api-link" href="/api/v1/pandemics">API</a>
        </li>
      </ul>
    </div>

    <div class="section">
      <span class="section-label">Project</span>
      <a class="about-link" href="/about">About SOS2526-10</a>
    </div>

  </div>

  <script>
    const canvas = document.querySelector('.bg-canvas');
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (8 + Math.random() * 12) + 's';
      p.style.animationDelay = (-Math.random() * 20) + 's';
      p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
      canvas.appendChild(p);
    }
  </script>
</body>
</html>
