name: CI_CD
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Levantar la aplicación en segundo plano
        run: npm run dev &
        
      - name: Esperar a que el servidor arranque
        run: sleep 10

      - name: Instalar Newman (Para probar la API)
        run: npm install -g newman

      - name: Ejecutar Tests de API (AGC v1)
        run: newman run test/api/AGC/test-AGC.json --env-var "BASE_URL=http://localhost:5173" --env-var "BASE_API_URL=/api/v1"

      - name: Ejecutar Tests de API (AGC v2)
        run: newman run test/api/AGC/test-AGC-v2.json --env-var "BASE_URL=http://localhost:5173" --env-var "BASE_API_URL=/api/v2"

      - name: Instalar Navegadores de Playwright (Para probar el Frontend)
        run: npx playwright install --with-deps

      - name: Ejecutar Tests E2E de Playwright (AGC)
        run: npx playwright test e2e/tests/AGC.spec.js